{% extends 'base.html' %}
{% block title %}Student Register — CampusPulse{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div class="text-center mb-5">
          <div style="font-size:2.5rem; color:var(--accent); margin-bottom:0.5rem;">🎓</div>
          <h1 style="font-family:var(--font-head); font-weight:800; font-size:1.8rem; color:var(--text);">Student Register</h1>
          <p style="color:var(--muted); font-size:0.9rem;">Create your CampusPulse student account</p>
        </div>

        <div class="form-card">
          {% if error %}
          <div class="alert-custom mb-4">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
          </div>
          {% endif %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Full Name <span style="color:red">*</span></label>
              <input type="text" name="name" class="form-control" placeholder="e.g. Yash Barhate" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address <span style="color:red">*</span></label>
              <input type="email" name="email" class="form-control" placeholder="you@college.edu" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Password <span style="color:red">*</span></label>
              <input type="password" name="password" class="form-control" placeholder="Create a password" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Roll Number</label>
              <input type="text" name="roll_no" class="form-control" placeholder="e.g. 24IT1008"/>
            </div>
            <div class="mb-4">
              <label class="form-label">Department</label>
              <select name="department" class="form-select">
                <option value="">Select Department</option>
                <option value="Information Technology">Information Technology</option>
                <option value="Computer Engineering">Computer Engineering</option>
                <option value="Electronics">Electronics</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Civil">Civil</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-person-plus-fill me-2"></i>Create Account
            </button>
          </form>

          <div style="margin-top:1.5rem; text-align:center; font-size:0.88rem; color:var(--muted);">
            Already have an account?
            <a href="/student/login" style="color:var(--accent); font-weight:600; text-decoration:none;"> Login here</a>
          </div>
        </div>

        <div class="text-center mt-4">
          <a href="/" style="font-size:0.85rem; color:var(--muted); text-decoration:none;">
            <i class="bi bi-arrow-left"></i> Back to events
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
